[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "venv",
  "build",
  "dist",
]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "W",   # pycodestyle warnings
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "SIM", # flake8-simplify
  "C4",  # flake8-comprehensions
]
ignore = [
  "E501", # handled by formatter / line wrapping pragmatically
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
  "S101", # assert is expected in tests (if bandit rules are added later)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
pretty = true
show_error_codes = true
exclude = "(^venv/|^\\.venv/|^build/|^dist/)"

[[tool.mypy.overrides]]
module = [
  "transformers.*",
  "torch.*",
  "uvicorn.*",
  "prometheus_client.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --strict-markers --strict-config --cov=app --cov-report=term-missing --cov-report=xml"
testpaths = ["tests"]
pythonpath = ["."]
markers = [
  "gpu: tests that require CUDA/GPU availability",
  "slow: slower integration/load-related tests",
]

[tool.coverage.run]
branch = true
source = ["app"]
omit = [
  "tests/*",
]

[tool.coverage.report]
skip_empty = true
show_missing = true
fail_under = 80
