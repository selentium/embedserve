default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: mypy .
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest (manual)
        entry: pytest
        language: system
        pass_filenames: false
        stages: [manual]

      - id: pip-audit
        name: pip-audit (manual)
        entry: pip-audit -r dev-requirements.txt
        language: system
        pass_filenames: false
        stages: [manual]

      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        files: '(^|/)(Dockerfile|.*\.Dockerfile)$'
